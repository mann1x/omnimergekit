# Recorded anchor-bench expectations per (stack_version, model_family).
#
# Append-only. When a new stack version lands, you re-run the anchor bench
# (10 GPQA + 10 AIME + 10 IFEval) on the canonical anchor model of each
# family and record the score here. Subsequent runs of that stack compare
# against the recorded value within ±tolerance.
#
# Anchor model selection rule: the *unmodified instruction-tuned baseline*
# of the family. For Gemma 4 26B-A4B that's the 128e original. Pick stable
# weights — do not anchor against an experimental variant.
#
# This catches stack-level scoring/generation regressions that the structural
# canary cannot (e.g. AIME 36 vs 73 with both having normal response shape).

stacks:
  gemma4-moe-stack@1:
    # Recorded 2026-05-21 from existing stack-pinned cohort runs on solidpc.
    # These are NOT predictions — they are observed scores on this exact stack.
    gemma-4-26B-A4B:
      anchor_model: google/gemma-4-26B-A4B-it           # NVFP4A16 local dir
      anchor_bench: anchor30
      # First-10 indices of each parent bench (deterministic subsets, see
      # eval/templates/anchor30.yaml). Tolerance is wide because n=10 is noisy.
      expected:
        gpqa_diamond:
          # 128e on stack-pinned: 73.23% full. 10q SE ≈ ±15pp.
          score: 0.73
          tolerance: 0.20
          metric: exact_match_flex
        aime24:
          # 128e AIME-30 full = 73.33%. 10q SE ≈ ±15pp.
          score: 0.73
          tolerance: 0.20
          metric: exact_match
        ifeval:
          # 128e ifeval_100 full ≈ 95%. 10q SE ≈ ±10pp.
          score: 0.95
          tolerance: 0.15
          metric: prompt_level_strict_acc

    gemma-4-31B:
      anchor_model: google/gemma-4-31B-it
      anchor_bench: anchor30
      expected:
        gpqa_diamond:
          score: 0.78
          tolerance: 0.20
          metric: exact_match_flex
        aime24:
          # 31B-it AIME ≈ 76.67% per he1 card cohort.
          score: 0.77
          tolerance: 0.20
          metric: exact_match
        ifeval:
          # 31B-it ifeval ≈ 96% per he1 card cohort.
          score: 0.96
          tolerance: 0.10
          metric: prompt_level_strict_acc

  gemma4-moe-stack@2:
    # Recorded 2026-05-21 17:19–18:07 CEST canary
    # (eval_results/canary/stack_v2_20260521_171905_fix-a-refined/).
    # Stack@2 = vLLM 0.21.1rc1.dev178+g3d92852eb (main HEAD with #42250
    # closure fix) + Fix-E parser cherry-pick + refined Fix-A (content-only
    # when content non-empty; reasoning fallback only on silent-empty).
    # All three sub-benches structural=PASS; verdict ALL_PASS.
    gemma-4-26B-A4B:
      anchor_model: google/Gemma-4-26B-A4B-it-NVFP4A16
      anchor_bench: anchor30
      expected:
        gpqa_diamond:
          # 128e NVFP4A16 stack@2 first-10 → 9/10. Full bench expected ~73-75%
          # consistent with stack@1 (vLLM PR #42250 doesn't affect 128e — it's
          # the pruned-MoE rumination root cause).
          score: 0.90
          tolerance: 0.20
          metric: exact_match_flex
        aime24:
          # 128e NVFP4A16 stack@2 first-10 → 7/10. Same recipe as stack@1
          # (greedy, thinking_token_budget=12288).
          score: 0.70
          tolerance: 0.20
          metric: exact_match
        ifeval:
          # 128e NVFP4A16 stack@2 first-10 → 10/10. Stack@1 baseline was
          # ~0.95 on full ifeval_100; under refined Fix-A the small 10q
          # subset hit a clean sweep. Wider tolerance to account for the
          # subset being permissive.
          score: 1.00
          tolerance: 0.20
          metric: prompt_level_strict_acc

  # Template entry for future families. Calibrate on first use.
  # qwen3.5-stack@1:
  #   qwen3.5-class:
  #     anchor_model: Qwen/Qwen3.5-1B-Instruct
  #     ...
