# mrcr_768k_synth_dcaon — OpenAI MRCR @ the synthetic 768k sub-band, DCA ON
# (chunk 8192 → 108 chunks). 768k_synth = the (688128, 851968] o200k slice carved
# from the 1M bin (see mrcr_helpers.BIN_CTX_TOKENS), giving a rung between 512k and
# 1M. DCA-only (far past native 262144). -c 884736 (108×8192) covers the worst-case
# GEMMA prompt (~710k model tok) + answer. f16 KV; peak VRAM recorded. n=8.
# Run with --backend llama --gpus <id>.

name: mrcr_768k_synth_dcaon
backend: mrcr
task: mrcr
n: 8

selection:
  type: filter
  mrcr_bin: 768k_synth
  needles: [2, 4, 8]
  num_samples: 8
  ctx_tokens: 851968

generation:
  max_gen_toks: 2048
  temperature: 0.0
  top_p: 1.0
  top_k: 0
  do_sample: false
  http_timeout: 7200.0

scoring:
  scorer: mrcr_helpers
  metric: pass_at_1
  filter: null

cache:
  sqlite_prefix: mrcr_768k_synth_dcaon

backend_args:
  enable_thinking: false
  num_concurrent: 1
  llama_parallel: 1
  random_seed: 42
  server_bin: /srv/ml/opencoti-dca/bin/llamafile
  server_prefix_args: ["--server"]
  llama_raw_serve: true
  llama_extra_replace: true
  llama_extra: ["-ngl", "99", "-fa", "on", "--parallel", "1", "--no-warmup",
                "--dca", "on", "--dca-chunk-size", "8192",
                "--ctx-checkpoints", "0", "--checkpoint-every-n-tokens", "-1"]
  llama_ctx: 884736
  llama_ctx_max: 884736

reports:
  token_stats: true

sanity:
  min_p10_chars: 1
