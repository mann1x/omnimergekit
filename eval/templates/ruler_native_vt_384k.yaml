# ruler_native_vt_384k — Variable Tracking at the ladder MIDPOINT (384k).
#
# Diagnostic point between the 256k anchor and the 512k YaRN target. Quality is
# EXPECTED to be lower at 512k than at 256k; this midpoint tells us the SHAPE of
# that decline:
#   - monotonic, gentle   (256k > 384k > 512k, small steps) -> healthy YaRN, the
#     far-position rope frequencies just degrade gracefully.
#   - cliff at the middle (256k >> 384k ~= 512k)            -> the β_fast/β_slow
#     boundary for partial_rotary_factor=0.25 is misplaced and collapses once
#     positions exceed the native 262144 band.
#   - flat then cliff (256k ~= 384k >> 512k)               -> extension holds to
#     ~1.5x and only breaks approaching the 2.0x edge (mscale / attention_factor).
# 384k = (262144 + 524288) / 2 = 393216 exactly — the true arithmetic midpoint.
#
# Greedy, 50 samples. Fits ONE 96GB GPU (~52GB model + ~31GB KV at 384k ~= 83GB);
# single-GPU is OK, TP=2 only for headroom / to match the 512k serve. Run the
# SAME served model + results-dir as the 256k/512k rungs so the three summary
# .scores form one comparable curve (distinct template names keep the dirs apart).

name: ruler_native_vt_384k
backend: ruler_native
task: ruler
n: 50

selection:
  type: filter
  ruler_task: vt
  ctx_tokens: 393216
  num_samples: 50

generation:
  max_gen_toks: 120
  temperature: 0.0
  top_p: 1.0
  top_k: 0
  do_sample: false
  http_timeout: 1800.0

scoring:
  scorer: ruler_helpers
  metric: pass_at_1
  filter: null

cache:
  sqlite_prefix: ruler_vt_384k

backend_args:
  # Single-flight at 384k — KV is too large to hold two contexts safely on one
  # 96GB GPU. Deliberate per-bench cap; CLI --parallel still wins. See vt_512k.
  num_concurrent: 1
  model_template_type: base
  tokenizer_type: hf
  random_seed: 42

reports:
  token_stats: true

sanity:
  min_p10_chars: 1

backend_overrides:
  vllm:
    generation:
      http_timeout: 2400.0      # 40 min/sample plausible at 384k (between 256k/512k)
  llama:
    generation:
      http_timeout: 2400.0
