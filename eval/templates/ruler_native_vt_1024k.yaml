# ruler_native_vt_1024k — Variable Tracking at 1M (DCA top rung).
#
# Cloned from ruler_native_vt_512k for the DCA (Dual Chunk Attention) RULER
# ladder. This is the headline 1M-context rung; DCA-extended A4B should keep
# VT meaningfully above the naive-extension (YaRN) baseline here. Greedy, 50
# samples. Needs a 97GB Blackwell (f16 KV at 1M doesn't fit a 24GB 3090).
#
# Served externally via the opencoti llamafile-DCA binary (omk_eval --no-server).

name: ruler_native_vt_1024k
backend: ruler_native
task: ruler
n: 50

selection:
  type: filter
  ruler_task: vt
  ctx_tokens: 1048576
  num_samples: 50

generation:
  max_gen_toks: 120
  temperature: 0.0
  top_p: 1.0
  top_k: 0
  do_sample: false
  http_timeout: 3600.0

scoring:
  scorer: ruler_helpers
  metric: pass_at_1
  filter: null

cache:
  sqlite_prefix: ruler_vt_1024k

backend_args:
  # Single-flight: one 1M context per GPU at a time.
  num_concurrent: 1
  model_template_type: base
  tokenizer_type: hf
  random_seed: 42

reports:
  token_stats: true

sanity:
  min_p10_chars: 1

backend_overrides:
  vllm:
    generation:
      http_timeout: 5400.0
  llama:
    generation:
      http_timeout: 5400.0
