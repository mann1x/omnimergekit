# mrcr_512k — OpenAI MRCR at the 512k token bin (o200k (262144, 524288]).
# See mrcr_256k.yaml for the serving/headroom/thinking notes. Requires context
# extension (DCA-on or trained-extended ckpt). n=32 pooled across 2/4/8 needles.

name: mrcr_512k
backend: mrcr
task: mrcr
n: 32

selection:
  type: filter
  mrcr_bin: 512k
  needles: [2, 4, 8]
  num_samples: 32
  ctx_tokens: 524288

generation:
  max_gen_toks: 2048
  temperature: 0.0
  top_p: 1.0
  top_k: 0
  do_sample: false
  http_timeout: 2400.0

scoring:
  scorer: mrcr_helpers
  metric: pass_at_1
  filter: null

cache:
  sqlite_prefix: mrcr_512k

backend_args:
  enable_thinking: false
  num_concurrent: 2
  random_seed: 42

reports:
  token_stats: true

sanity:
  min_p10_chars: 1

backend_overrides:
  vllm:
    generation:
      http_timeout: 3000.0
  llama:
    generation:
      http_timeout: 3000.0
