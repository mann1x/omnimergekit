# LCB-medium 15-problem curated smoke for v5-coder T21 qualification.
#
# Subset construction (2026-05-17 rebuild — replaces the prior
# "first-15-by-date" formulation which had v4=12/15, too little headroom):
#   - Filter A — 128e PASS: every selected problem is solved by 128e.
#   - Filter B — 128e didn't ruminate: 128e completion_chars below p75 of
#     the 128e-PASS pool (~12 422 chars). Excludes problems where even the
#     baseline thrashed; those are no fair smoke probes for a pruned model.
#   - Composition: 6 v4-fails (sorted by 128e_chars ascending — the cleanest
#     pruning-damage probes) + 9 v4-passes (sorted by 128e_chars ascending
#     — fast canary problems where 128e + v4 both succeed quickly).
#
# v4 and 128e anchors (extracted from LCB-55 lcb_result.json on disk):
#   v4   LCB-15 = 9/15 (0.600)    (fails: 3487, 3686, 3634, 3720, 3771, 3805)
#   128e LCB-15 = 15/15 (1.000)
#
# Smoke property: any v5-coder candidate that scores >9/15 strictly beats
# v4; ≥9/15 ties. The 6 v4-fail probes are the discriminator; v5-coder
# winning one or more of them is the meaningful signal.
#
# Used by T21 qualification of v5-coder candidates. Sits between
# lcb_medium_5 (canary, 5q, v4=5/5) and lcb_medium_30 / 55 (full).
name: lcb_medium_15
backend: lcb_custom
task: livecodebench
n: 15
selection:
  type: explicit
  difficulty: medium
  min_date: "2024-10-01"
  testtype: functional
  task_ids:
    # v4-fails (6) — discriminator probes, sorted by 128e_chars
    - "lcb/leetcode/3634"
    - "lcb/leetcode/3720"
    - "lcb/leetcode/3686"
    - "lcb/leetcode/3487"
    - "lcb/leetcode/3805"
    - "lcb/leetcode/3771"
    # v4-passes (9) — clean reference points, sorted by 128e_chars
    - "lcb/leetcode/3639"
    - "lcb/leetcode/3764"
    - "lcb/leetcode/3627"
    - "lcb/leetcode/3785"
    - "lcb/leetcode/3566"
    - "lcb/leetcode/3795"
    - "lcb/leetcode/3649"
    - "lcb/leetcode/3809"
    - "lcb/leetcode/3751"
generation:
  max_gen_toks: 16384
  thinking_token_budget: 12288
  temperature: 0.0
  top_p: 1.0
  top_k: 0
  do_sample: false
  http_timeout: 1200
scoring:
  scorer: lcb_helpers
  validated_against: lcb_runner.evaluation.testing_util.grade_call_based
  validation_date: "2026-05-17"
backend_args:
  apply_chat_template: true
  vllm_reasoning_parser: gemma4
  vllm_default_chat_template_kwargs: {enable_thinking: true}
cache:
  sqlite_prefix: lcb_med_15
reports:
  token_stats: true
