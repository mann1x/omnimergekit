# mrcr_1024k — OpenAI MRCR at the 1M token bin (o200k (524288, 1048576]).
# The hardest published rung. See mrcr_256k.yaml for serving/headroom/thinking
# notes. Requires full ~1M context (DCA-on at chunk-extended ctx). n=32 pooled
# across 2/4/8 needles; each sample is a ~1M-token prefill — many minutes each.

name: mrcr_1024k
backend: mrcr
task: mrcr
n: 32

selection:
  type: filter
  mrcr_bin: 1024k
  needles: [2, 4, 8]
  num_samples: 32
  ctx_tokens: 1048576

generation:
  max_gen_toks: 2048
  temperature: 0.0
  top_p: 1.0
  top_k: 0
  do_sample: false
  http_timeout: 3600.0

scoring:
  scorer: mrcr_helpers
  metric: pass_at_1
  filter: null

cache:
  sqlite_prefix: mrcr_1024k

backend_args:
  enable_thinking: false
  num_concurrent: 1
  random_seed: 42

reports:
  token_stats: true

sanity:
  min_p10_chars: 1

backend_overrides:
  vllm:
    generation:
      http_timeout: 3600.0
  llama:
    generation:
      http_timeout: 3600.0
