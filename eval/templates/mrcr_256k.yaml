# mrcr_256k — OpenAI MRCR at the 256k token bin (o200k (131072, 262144]).
#
# Long-context multi-needle co-reference. n=32 pooled across 2/4/8 needles (DCA
# ladder size; raise to 100 for a publish-grade, OpenAI-comparable number).
# Score = mean difflib SequenceMatcher ratio after the hash-prefix gate (0-1).
#
# Serving note: o200k 256k tokens ≈ 1.1-1.3× as many GEMMA tokens, so the served
# context (-c / --max-model-len) must have ~25-30% headroom over 262144, and the
# 256k bin already needs context EXTENSION (DCA-on or a trained-extended ckpt) on
# a native-262144 model. The runner reports prompt_tokens_median (served actual)
# so drift is visible. THINKING MUST BE OFF (response must begin with the hash).

name: mrcr_256k
backend: mrcr
task: mrcr
n: 32

selection:
  type: filter
  mrcr_bin: 256k
  needles: [2, 4, 8]
  num_samples: 32
  ctx_tokens: 262144

generation:
  max_gen_toks: 2048
  temperature: 0.0
  top_p: 1.0
  top_k: 0
  do_sample: false
  http_timeout: 1800.0

scoring:
  scorer: mrcr_helpers
  metric: pass_at_1
  filter: null

cache:
  sqlite_prefix: mrcr_256k

backend_args:
  enable_thinking: false
  num_concurrent: 2
  random_seed: 42

reports:
  token_stats: true

sanity:
  min_p10_chars: 1

backend_overrides:
  vllm:
    generation:
      http_timeout: 2400.0
  llama:
    generation:
      http_timeout: 2400.0
