# ruler_native_mk1_512k — Multi-Key NIAH at the YaRN factor=2.0 target.
#
# Companion to ruler_native_vt_512k — the YaRN validation triad needs BOTH
# the long-range strict-sequence-tracking probe (VT) and the high-freq
# tracking probe (Multi-Key). Compare the 512k → 256k delta on each: if VT
# drops more, YaRN's low-freq extrapolation is the weak link; if Multi-Key
# drops more, the high-freq pass-through dims are corrupted.

name: ruler_native_mk1_512k
backend: ruler_native
task: ruler
n: 50

selection:
  type: filter
  ruler_task: niah_multikey_1
  ctx_tokens: 524288
  num_samples: 50

generation:
  max_gen_toks: 128
  temperature: 0.0
  top_p: 1.0
  top_k: 0
  do_sample: false
  http_timeout: 1800.0

scoring:
  scorer: ruler_helpers
  metric: pass_at_1
  filter: null

cache:
  sqlite_prefix: ruler_mk1_512k

backend_args:
  # FORCE override: single-flight at 512k — KV can't hold two 512k contexts.
  # Deliberate per-bench cap (not host tuning); omk_eval honors it as a hard
  # ceiling on total in-flight. CLI --parallel still wins. See ruler_native_vt_512k.
  num_concurrent: 1
  model_template_type: base
  tokenizer_type: hf
  random_seed: 42

reports:
  token_stats: true

sanity:
  min_p10_chars: 1

backend_overrides:
  vllm:
    generation:
      http_timeout: 2700.0
  llama:
    generation:
      http_timeout: 2700.0
