# mrcr_256k_dcaoff — OpenAI MRCR @ 256k o200k bin, NATIVE attention (DCA OFF).
#
# T87.pD perf overview: the DCA-OFF arm of the 256k A/B. Served by the SAME
# opencoti DCA llamafile as the _dcaon arm — only `--dca on …` is dropped — so
# prefill/gen tok/s + peak VRAM are a true apples-to-apples isolation of the DCA
# overhead. 256k is the LAST bin a native-262144 model can serve (o200k 256k ≈
# 218-238k GEMMA tokens, fits -c 262144); 512k/1M have no DCA-off arm.
#
# Throughput + VRAM are captured canonically by mrcr_runner (server `timings` +
# nvidia-smi poll on the omk-pinned GPU) → mrcr_result.json → summary.json.
# Run with --backend llama --gpus <id> (single-flight; n small for a perf read).

name: mrcr_256k_dcaoff
backend: mrcr
task: mrcr
n: 16

selection:
  type: filter
  mrcr_bin: 256k
  needles: [2, 4, 8]
  num_samples: 16
  ctx_tokens: 262144

generation:
  max_gen_toks: 2048
  temperature: 0.0
  top_p: 1.0
  top_k: 0
  do_sample: false
  http_timeout: 3600.0

scoring:
  scorer: mrcr_helpers
  metric: pass_at_1
  filter: null

cache:
  sqlite_prefix: mrcr_256k_dcaoff

backend_args:
  enable_thinking: false
  num_concurrent: 1
  llama_parallel: 1
  random_seed: 42
  # DCA-serve passthrough: omk launches the opencoti llamafile itself
  # (server_bin + ["--server"]) with the validated serve recipe carried
  # verbatim (llama_raw_serve=true → no opinionated omk defaults injected).
  # This is the DCA-OFF arm: the --dca pair is intentionally absent.
  server_bin: /srv/ml/opencoti-dca/bin/llamafile
  server_prefix_args: ["--server"]
  llama_raw_serve: true
  llama_extra_replace: true
  llama_extra: ["-ngl", "99", "-fa", "on", "--parallel", "1", "--no-warmup",
                "--ctx-checkpoints", "0", "--checkpoint-every-n-tokens", "-1"]
  llama_ctx: 262144
  llama_ctx_max: 262144

reports:
  token_stats: true

sanity:
  min_p10_chars: 1
