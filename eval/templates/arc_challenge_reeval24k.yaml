# ARC-Challenge — full 1172 test items, chat-completions variant.
# Chat path is required for instruction-tuned models (raw completions can
# emit explanatory prose ahead of the letter answer and break the regex).
name: arc_challenge_reeval24k
backend: lm-eval
task: arc_challenge_reeval24k  # chat-aware shadow; see lm_eval_tasks/arc_challenge_chat/
n: 1172
selection:
  type: filter
  all: true
generation:
  max_gen_toks: 49152       # re-eval: bumped from 16384 to fit thinking@24k + answer headroom
  thinking_token_budget: 24576    # re-eval: bumped from 12288 for fair retry of length-capped problems
  temperature: 0.0
  top_p: 1.0
  top_k: 0
  do_sample: false
scoring:
  metric: exact_match
  filter: flexible-extract
  validated_against: allenai/ai2_arc
  validation_date: "2026-05-12"
sanity:
  # ARC-Challenge answers are a single letter (or letter + brief justification).
  # Default p10>=60 threshold is too strict for this bench.
  min_p10_chars: 1
backend_args:
  apply_chat_template: true
  num_fewshot: 0
  batch_size: 1
  # ARC-Challenge is MCQ: model needs to emit a single letter as the final
  # answer. With enable_thinking=true the model reasons silently in the
  # channel and the chat-completions `content` field ends up empty (resps
  # are all-blank → exact_match=0). Validated empirically on 128e 2026-05-12.
  # Run without parser/thinking so the answer goes straight into `content`.
  vllm_reasoning_parser: ""
  vllm_default_chat_template_kwargs: {enable_thinking: false}
  lm_eval_include_path: lm_eval_tasks  # recursive — picks up reeval24k/ + any sibling shadow
cache:
  sqlite_prefix: arc_challenge_reeval24k
reports:
  token_stats: true
