# ruler_native_mk1_384k — Multi-Key NIAH at the ladder MIDPOINT (384k).
#
# Retrieval-rate companion to ruler_native_vt_384k. NIAH (`niah_multikey_1`)
# measures pure RETRIEVAL — find the needle's value among same-type distractor
# keys buried in a 384k haystack — where VT measures tracking/reasoning over the
# context. Together the two ladders separate the failure mode:
#   - if NIAH (retrieval) holds but VT (tracking) drops -> the model still FINDS
#     far tokens but can't CHAIN them; low-freq extrapolation reasoning is weak.
#   - if NIAH drops too -> far positions are not even retrievable; the high-freq
#     pass-through dims (β_fast / head_dim split) are corrupted.
#
# 384k = (262144 + 524288) / 2 = 393216 exactly — same midpoint as vt_384k, so
# the NIAH curve 256k/384k/512k reads against the VT curve at matching ctx. The
# midpoint distinguishes monotonic retrieval decay from a mid-context cliff.
#
# Greedy, 50 samples. NIAH answers are short ID strings — 128 max_tokens ample.
# Fits ONE 96GB GPU (~52GB model + ~31GB KV at 384k); single-flight, TP=2 only
# for headroom / to match the 512k serve. Same served model + results-dir as the
# mk1 256k/512k rungs so the three .scores form one comparable retrieval curve.

name: ruler_native_mk1_384k
backend: ruler_native
task: ruler
n: 50

selection:
  type: filter
  ruler_task: niah_multikey_1
  ctx_tokens: 393216
  num_samples: 50

generation:
  max_gen_toks: 128
  temperature: 0.0
  top_p: 1.0
  top_k: 0
  do_sample: false
  http_timeout: 1800.0

scoring:
  scorer: ruler_helpers
  metric: pass_at_1
  filter: null

cache:
  sqlite_prefix: ruler_mk1_384k

backend_args:
  # Single-flight at 384k — KV too large to hold two contexts on one 96GB GPU.
  # Deliberate per-bench cap; CLI --parallel still wins. See ruler_native_vt_512k.
  num_concurrent: 1
  model_template_type: base
  tokenizer_type: hf
  random_seed: 42

reports:
  token_stats: true

sanity:
  min_p10_chars: 1

backend_overrides:
  vllm:
    generation:
      http_timeout: 2400.0      # 40 min/sample plausible at 384k (between 256k/512k)
  llama:
    generation:
      http_timeout: 2400.0
