# EVAL_PROTOCOL v3 stack lock — single source of truth for the evaluation stack.
#
# This file is rsynced identically to every pod. `install_stack.sh stack.lock.yaml`
# produces the same conda envs locally and on cloud GPUs. Any cohort's STACK.txt
# must reference {name}@{version} of this file.
#
# Update rules (see EVAL_PROTOCOL.md §v3.3):
#   1. propose change in stack.lock.dev.yaml + bump version
#   2. run `omk_canary.py --stack stack.lock.dev.yaml` on local + a pod
#   3. all canaries pass → promote .dev → live + append to STACK_HISTORY.md
#   4. cohort runs reference the locked stack; HF cards cite stack version
#
# Mid-cohort changes are FORBIDDEN — once a cohort starts, stack is frozen.

name: gemma4-moe-stack
version: 2
created: "2026-05-21"
applies_to:
  families:
    - gemma-4-26B-A4B           # MoE 128-expert
    - gemma-4-A4B-*e            # MoE pruned variants (109e, 98e, ...)
    - gemma-4-31B               # dense

# WHAT CHANGED FROM v1:
#   v1 = stock vLLM 0.20.2 wheel (canary-FAIL on HE/IFEval for pruned MoE).
#   v1 was missing PR #42250 (Gemma4 MoE closure-capture fix) — this PR was
#   merged to main *after* 0.20.2 was tagged, so the release shipped without
#   it. Stock 0.20.2 + pruned MoE Gemma 4 routes incorrectly → model
#   ruminates → 10-23k char response p50 on bench tasks that should answer
#   in 600-700 chars. v6-coder IFEval 22 % cliff and HE -3-7 pp losses
#   were attributable to this missing fix, not to model weights.
#
#   v2 = vLLM main HEAD (which includes #42250) + Fix-E parser hardening.
#   The closure fix is the rumination root-cause patch; the parser patch
#   is the 8-line safety net for any remaining half-open closures.

components:
  vllm:
    # Built from source — see scripts/build_vllm_wheels.sh
    source:
      branch: gemma4-moe-stack-v2
      base_sha: "68e07d591"            # upstream/main HEAD 2026-05-21 04:58 EDT
      cherry_picks:
        - {sha: "3d92852eb",
           originally: "a39e23ed0",
           name: "fix_e_parser_hardening",
           subject: "[Bugfix][Reasoning] Gemma4 parser: surface reasoning as content on half-open thinking"}
    # Wheels produced per CUDA compute capability — install_stack.sh picks
    # the matching one by reading the GPU via nvidia-smi.
    wheels_dir: "wheels/gemma4-moe-stack-v2/"
    arches:
      sm86:  "RTX 3090, A40"
      sm89:  "RTX 4090, L40, RTX 6000 Ada"
      sm90:  "H100, H200"
      sm100: "B100, B200 (datacenter Blackwell)"
      sm120: "RTX 50-series (consumer Blackwell)"
    env: vllm

    upstream_fixes_in_base:
      - {pr: 42250, subject: "Gemma4 MoE routing closure captures per_expert_scale — root cause of rumination"}
      - {pr: 42434, subject: "Revert #39917 routing replay (already reverted)"}
      - {pr: 43223, subject: "FlashInfer TRTLLM NvFP4 monolithic MoE routing"}
      - {pr: 38939, subject: "Add routed experts to openai entrypoint (opt-in)"}
      - {pr: 42664, subject: "Normalize reasoning_content to reasoning on requests"}

  lm_eval:
    pip: "lm-eval[api,math,ifeval]==0.4.11"
    env: omnimergekit
    patches:
      - file: lm_eval/models/openai_completions.py
        name: fix_a_reasoning_content_fallback
        purpose: |
          Original (2026-05-14): vLLM <0.21 on Gemma 4 hit "silent empty"
          where content="" and the answer lived in reasoning_content. The
          first Fix-A concatenated reasoning + content whenever both
          existed, which contaminated rule-based scorers (IFEval no-comma,
          lowercase, multi-section) with the planning bullets the model
          emits during thinking.
          Refined (2026-05-21, stack@2): with Fix-E parser hardening in
          vLLM main, content is now populated reliably. Behavior is now
          content-first; reasoning_content is the fallback ONLY when
          content is genuinely empty. Rescues silent-empty without
          contaminating IFEval scorers. Found by stack@2 anchor canary
          (raw IFEval 0.10 vs expected ~0.95 — all 9/10 misses due to
          reasoning leak, not model error).
        sentinel_line: 'or msg.get("reasoning_content")'

  modelopt:
    pip: "nvidia-modelopt==0.43.0"
    env: modelopt
    pin_reason: |
      0.44.0 has two Gemma 4 regressions (config dict→list + bf16 calibration
      NaN). 0.43.0 release matches solidPC behavior.

  omnimergekit_eval:
    git_remote: "git@github.com:mann1x/omnimergekit.git"
    subdir: "eval/"
    track: "main"
    pinned_sha: "da4d8703c387775b0e34a74020920d4aa293d450"

  templates:
    sha_check_command: "git rev-parse HEAD -- eval/templates/{}.yaml"
    names:
      - gpqa_diamond_full
      - gsm8k_100
      - math500_100
      - aime_30
      - arc_challenge_full
      - ifeval_100
      - humaneval_full
      - humanevalplus_full
      - lcb_medium_55_v4
      - anchor30           # canary subset

hardware:
  driver_cuda_min: 13
  cudnn_min: 9
  vram_gb_min: 24
