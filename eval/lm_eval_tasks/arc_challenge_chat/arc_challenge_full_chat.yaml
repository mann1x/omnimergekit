# Chat-aware ARC-Challenge shadow task. Same dataset (allenai/ai2_arc,
# ARC-Challenge) as the stock arc_challenge_chat, with two changes:
#   1. No `until` truncation — let the model finish its full reply.
#      Stock used `until=['\n\n', '.']` which cut at the first period.
#   2. process_results uses utils_chat.process_results which extracts
#      the answer letter via natural-language regex
#      ("The best answer is X" / "Answer: X" / last A-D in tail).
# Validated against 128e NVFP4A16 chain samples; stock 0/1172 → recoverable.
task: arc_challenge_full_chat
dataset_path: allenai/ai2_arc
dataset_name: ARC-Challenge
output_type: generate_until
training_split: train
validation_split: validation
test_split: test
fewshot_split: train
doc_to_text: 'Given the following question and four candidate answers (A, B, C and D), choose the best answer.\nQuestion: {{question.strip()}}\nA. {{choices.text[0]}}\nB. {{choices.text[1]}}\nC. {{choices.text[2]}}{% if choices.text|length > 3 %}\nD. {{choices.text[3]}}{% endif %}\nYour response should end with "The best answer is [the_answer_letter]" where the [the_answer_letter] is one of A, B, C or D.'
fewshot_delimiter: "\n\n"
doc_to_target: "{{ 'ABCD'[answerKey|int - 1] if answerKey|string in '1234' else answerKey }}"
num_fewshot: 0
process_results: !function utils_chat.process_results
generation_kwargs:
  max_gen_toks: 512
  do_sample: false
  temperature: 0.0
  until:
    - "Question:"
    - "</s>"
    - "<|im_end|>"
    - "<|eot_id|>"
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
metadata:
  version: 0.0
